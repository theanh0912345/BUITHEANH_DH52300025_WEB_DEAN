<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .menutop{
            background-color: rgb(194, 168, 168);

        }
        .menu_ngang{
            list-style: none;
            padding: 0;
            display: flex;
        }
        .menu_ngang li a{
            text-decoration: none;
            color: aliceblue;
            padding: 18px;
            margin: 1px;
            transition: .5 ease-in-out;
        }
        .menu_ngang .icon{
            display: none;
        }
        .menu_ngang li a:hover{

        }
        @media screen and (max-width: 600px) {
          .menu_ngang{
            flex-direction: column;
          }
          .menu_ngang li{
            border-bottom: 1px solid black;
            line-height: 3;
          }
            
         }
    </style>
</head>
<body>
    <div class="menutop">
        <ul class="menu_ngang">
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li> <a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
            <a class="icon"><img src="Vi_du/img/menu-bar.png" alt="" height="20px" width="20px"></a>
        </ul>
    </div>
</body>
</html>
