<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        /* menu nằm ngang */
        .menu_ngang{
            list-style: none;
            display: flex;
            padding: 0;
        }
        .menu_ngang li{
            margin:0;
            padding: 10px;
            background-color: rgb(57, 25, 20);
            width: 1000px;
            border-right: rgb(255, 255, 255) 2px solid;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 23px;
        }
        .menu_ngang li a{
            text-decoration: none;
            color: aliceblue;
        }
        .menu_ngang li:hover{
            background-color: orange;
            /* color: aliceblue; */
           
            border-radius: 5px;
        }
        .menu_ngang li a:hover{
            color: rgb(255, 255, 255);
            font-weight: bolder;
        }
        /* menu nằm dọc */
        .menu_doc{
            list-style: none;
            padding:0px;
            display: flex;
            flex-direction: column;
        }
        .menu_doc li{
            padding: 10px;
            background-color: #3498db;
            border-bottom: rgb(255, 255, 255) 2px;
        }
        .menu_doc li a{
            text-decoration: none;
            color:black
        }
        .menu_doc li:hover{
            background-color: rgb(112, 207, 252) ;
        }
        .menu_doc li a:hover{
            font-style: italic;
        }
        #menu-container{
            width: 982px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div id="menu-container">
    <ul class="menu_ngang">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Sản phẩm</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul>
    <!-- Menu dọc -->
    <!-- <ul class="menu_doc">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Sản phẩm</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul> -->
    </div>
</body>
</html>
